<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lernkarten">
<meta name="theme-color" content="#4F46E5">
<title>Lernkarten</title>
<link rel="manifest" href="data:application/json,{%22name%22:%22Lernkarten%22,%22short_name%22:%22Lernkarten%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%234F46E5' width='192' height='192'/><text x='50%' y='50%' font-size='120' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'>📚</text></svg>%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any%22}],%22start_url%22:%22.%22,%22display%22:%22fullscreen%22,%22orientation%22:%22portrait%22,%22theme_color%22:%22%234F46E5%22,%22background_color%22:%22%23F1F5F9%22}">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #4F46E5;
  --primary-dk: #3730A3;
  --bg: #F1F5F9;
  --surface: #FFFFFF;
  --text: #0F172A;
  --muted: #64748B;
  --border: #E2E8F0;
  --r: 14px;
}

html, body { height: 100%; width: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
  padding-top: max(0px, env(safe-area-inset-top));
  padding-bottom: max(20px, env(safe-area-inset-bottom));
}

.app {
  width: 100%;
  max-width: 500px;
  padding: 0 16px;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 0 18px;
}
.header h1 { font-size: 22px; font-weight: 700; }
.header-right {
  margin-left: auto;
  display: flex;
  gap: 8px;
}
.logout-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 14px;
  padding: 6px 10px;
  border-radius: 6px;
}
.logout-btn:hover { background: #EEF2FF; color: var(--primary); }
.back-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 22px;
  color: var(--primary);
  line-height: 1;
  padding: 4px 6px;
  border-radius: 8px;
}
.back-btn:hover { background: #EEF2FF; }

/* SCREENS */
.screen { display: none; flex-direction: column; flex: 1; }
.screen.active { display: flex; }

/* LOGIN */
.login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 40px 20px;
}
.login-icon { font-size: 60px; }
.login-title { font-size: 24px; font-weight: 700; text-align: center; }
.login-text { text-align: center; color: var(--muted); margin-bottom: 10px; }
.google-btn {
  padding: 14px 20px;
  border-radius: var(--r);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid #4285F4;
  background: white;
  color: #4285F4;
  width: 100%;
  max-width: 300px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.google-btn:hover { background: #F8F9FA; }

/* STATS */
.stats-row {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin-bottom: 24px;
}
.stat {
  background: var(--surface);
  border-radius: 10px;
  padding: 10px 6px;
  text-align: center;
  border-bottom: 3px solid var(--border);
}
.stat-num { font-size: 22px; font-weight: 800; display: block; }
.stat-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; display: block; }
.s0 { border-color: #EF4444; } .s0 .stat-num { color: #EF4444; }
.s1 { border-color: #F97316; } .s1 .stat-num { color: #F97316; }
.s2 { border-color: #EAB308; } .s2 .stat-num { color: #EAB308; }
.s3 { border-color: #84CC16; } .s3 .stat-num { color: #84CC16; }
.s4 { border-color: #22C55E; } .s4 .stat-num { color: #22C55E; }

/* BUTTONS */
.btn {
  padding: 16px 20px;
  border-radius: var(--r);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  width: 100%;
  transition: all 0.15s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: var(--primary-dk); }
.btn-primary:active { transform: scale(0.98); }
.btn-secondary { background: var(--surface); color: var(--text); border: 2px solid var(--border); }
.btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
.menu-btns { display: flex; flex-direction: column; gap: 10px; }

.io-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn-sm {
  padding: 12px 16px;
  border-radius: var(--r);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  transition: all 0.15s;
  width: 100%;
}
.btn-sm:hover { border-color: var(--primary); color: var(--primary); }

/* ADD FORM */
.form-group { margin-bottom: 14px; }
label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--muted);
  margin-bottom: 6px;
}
textarea {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: var(--r);
  font-size: 16px;
  font-family: inherit;
  resize: vertical;
  min-height: 90px;
  background: var(--surface);
  color: var(--text);
  transition: border-color 0.15s;
}
textarea:focus { outline: none; border-color: var(--primary); }

/* CARDS LIST */
.cards-total {
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  padding: 8px 0 14px;
}
.cards-list { flex: 1; overflow-y: auto; padding-bottom: 20px; }
.card-item {
  background: var(--surface);
  border-radius: var(--r);
  padding: 12px 14px;
  margin-bottom: 8px;
  border-left: 4px solid var(--border);
  display: flex;
  align-items: flex-start;
  gap: 10px;
}
.ci0 { border-color: #EF4444; }
.ci1 { border-color: #F97316; }
.ci2 { border-color: #EAB308; }
.ci3 { border-color: #84CC16; }
.ci4 { border-color: #22C55E; }
.card-item-body { flex: 1; }
.ci-q { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.ci-a { font-size: 13px; color: var(--muted); }
.del-btn {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 15px;
  padding: 2px 6px;
  border-radius: 6px;
  flex-shrink: 0;
}
.del-btn:hover { color: #EF4444; background: #FEE2E2; }

/* QUIZ */
.quiz-meta {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}
.prog-bar {
  flex: 1;
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.prog-fill {
  height: 100%;
  background: var(--primary);
  border-radius: 3px;
  transition: width 0.35s ease;
}
.prog-txt { font-size: 13px; color: var(--muted); white-space: nowrap; }

.flashcard {
  background: var(--surface);
  border-radius: 18px;
  padding: 28px 24px;
  min-height: 220px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  box-shadow: 0 4px 24px rgba(0,0,0,0.09);
  cursor: pointer;
  position: relative;
  margin-bottom: 20px;
  user-select: none;
}
.flashcard:hover { box-shadow: 0 6px 30px rgba(0,0,0,0.13); }

.fc-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 10px;
}
.fc-text { font-size: 20px; line-height: 1.5; font-weight: 500; }
.fc-divider { height: 1px; background: var(--border); margin: 18px 0; }
.fc-tap-hint {
  text-align: center;
  font-size: 13px;
  color: var(--muted);
  margin-top: 18px;
}

.drill-badge {
  position: absolute;
  top: 14px;
  right: 14px;
  background: #FEE2E2;
  color: #B91C1C;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 9px;
  border-radius: 6px;
}

.quiz-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 12px;
}
.quiz-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 8px;
  font-size: 13px;
  border: none;
  cursor: pointer;
  background: var(--surface);
  color: var(--muted);
  border: 2px solid var(--border);
  font-weight: 600;
}
.quiz-actions button:hover { border-color: var(--primary); color: var(--primary); }

/* 2-BUTTON RATING */
.rating-wrap { display: none; }
.rating-lbl { text-align: center; font-size: 14px; color: var(--muted); margin-bottom: 14px; }
.rating-btns-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.rbtn2 {
  padding: 18px 12px;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  border: none;
  transition: all 0.12s;
}
.rbtn2:hover { transform: translateY(-2px); filter: brightness(0.93); }
.rbtn2:active { transform: scale(0.97); }
.r-no  { background: #FEE2E2; color: #991B1B; }
.r-yes { background: #DCFCE7; color: #15803D; }

.kbd {
  display: inline-block;
  background: rgba(0,0,0,0.1);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 12px;
  font-family: monospace;
  margin-left: 6px;
  vertical-align: middle;
}

/* SUMMARY */
.summary {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 24px 0;
}
.sum-emoji { font-size: 64px; margin-bottom: 16px; }
.sum-title { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
.sum-text { color: var(--muted); line-height: 1.6; margin-bottom: 28px; }
.sum-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; }

/* EMPTY */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: var(--muted);
  padding: 40px 20px;
  gap: 10px;
}
.empty-icon { font-size: 52px; }
</style>
</head>
<body>
<div class="app">

  <!-- LOGIN SCREEN -->
  <div id="s-login" class="screen active">
    <div class="login-screen">
      <div class="login-icon">📚</div>
      <div class="login-title">Lernkarten</div>
      <div class="login-text">Melde dich mit Google an um zu beginnen</div>
      <button class="google-btn" onclick="loginGoogle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10" fill="#4285F4"/>
          <text x="12" y="15" font-size="14" fill="white" text-anchor="middle" font-weight="bold">G</text>
        </svg>
        Mit Google anmelden
      </button>
    </div>
  </div>

  <!-- HOME -->
  <div id="s-home" class="screen">
    <div class="header">
      <h1>Lernkarten</h1>
      <div class="header-right">
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
    </div>
    <div id="stats-row" class="stats-row"></div>
    <div class="menu-btns">
      <button class="btn btn-primary" onclick="startQuiz()">Abfragen starten</button>
      <button class="btn btn-secondary" onclick="showScreen('s-add')">Karte hinzufügen</button>
      <button class="btn btn-secondary" onclick="openCardsList()">Alle Karten</button>
      <div class="io-row">
        <button class="btn-sm" onclick="exportCSV()">↓ Als CSV speichern</button>
        <button class="btn-sm" onclick="triggerImport()">↑ CSV importieren</button>
      </div>
      <input type="file" id="csv-in" accept=".csv" style="display:none" onchange="switchKartei(this)">
    </div>
  </div>

  <!-- ADD -->
  <div id="s-add" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('s-home')">←</button>
      <h1>Neue Karte</h1>
    </div>
    <div class="form-group">
      <label>Frage</label>
      <textarea id="inp-q" placeholder="Was soll abgefragt werden?" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Antwort</label>
      <textarea id="inp-a" placeholder="Die Antwort darauf …" rows="4"></textarea>
    </div>
    <button class="btn btn-primary" id="save-btn" onclick="addCard()">Speichern</button>
  </div>

  <!-- CARDS LIST -->
  <div id="s-cards" class="screen">
    <div class="header">
      <button class="back-btn" onclick="showScreen('s-home')">←</button>
      <h1>Alle Karten</h1>
    </div>
    <div id="cards-total" class="cards-total"></div>
    <div id="cards-list" class="cards-list"></div>
  </div>

  <!-- QUIZ -->
  <div id="s-quiz" class="screen">
    <div class="header">
      <button class="back-btn" onclick="endQuiz()">←</button>
      <h1 id="quiz-title">Abfrage</h1>
    </div>
    <div id="quiz-body"></div>
  </div>

</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js';
import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js';
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, onSnapshot, query, where } from 'https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyB-oTAfcV4h2mNvj2Wfzike84JUxncaR2g",
  authDomain: "lernkarten-17750.firebaseapp.com",
  projectId: "lernkarten-17750",
  storageBucket: "lernkarten-17750.firebasestorage.app",
  messagingSenderId: "568529536947",
  appId: "1:568529536947:web:a38ce63a2f21ff49c4adc6"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let currentUser = null;
let cards = [];
let Q = null;
const LVL_LABELS = ['Gar nicht', 'Schlecht', 'Mittel', 'Gut', 'Sehr gut'];
const WEIGHTS = [10, 6, 3, 1.5, 0.5];

// ── Auth ──────────────────────────────────────────────────────
onAuthStateChanged(auth, (user) => {
  currentUser = user;
  if (user) {
    loadCards();
    showScreen('s-home');
  } else {
    showScreen('s-login');
  }
});

function loginGoogle() {
  signInWithPopup(auth, provider).catch(err => alert('Login fehlgeschlagen: ' + err.message));
}

function logout() {
  if (confirm('Wirklich abmelden?')) {
    signOut(auth).then(() => {
      cards = [];
      removeAllListeners();
      showScreen('s-login');
    });
  }
}

// ── Listeners ─────────────────────────────────────────────────
let unsubscribe = null;
function removeAllListeners() {
  if (unsubscribe) unsubscribe();
}

function loadCards() {
  if (!currentUser) return;
  const q = query(collection(db, 'cards'), where('userId', '==', currentUser.uid));
  unsubscribe = onSnapshot(q, (snap) => {
    cards = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderStats();
  }, (err) => console.error('Load error:', err));
}

// ── Navigation ────────────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if (id === 's-home') renderStats();
}

// ── Stats ─────────────────────────────────────────────────────
function renderStats() {
  const cnt = [0,0,0,0,0];
  cards.forEach(c => cnt[c.level || 0]++);
  document.getElementById('stats-row').innerHTML = cnt.map((n,i) =>
    `<div class="stat s${i}"><span class="stat-num">${n}</span><span class="stat-lbl">${LVL_LABELS[i]}</span></div>`
  ).join('');
}

// ── Add card ──────────────────────────────────────────────────
async function addCard() {
  const q = document.getElementById('inp-q').value.trim();
  const a = document.getElementById('inp-a').value.trim();
  if (!q || !a) { alert('Bitte Frage und Antwort eingeben.'); return; }

  try {
    await addDoc(collection(db, 'cards'), {
      userId: currentUser.uid,
      question: q,
      answer: a,
      level: 0,
      createdAt: new Date()
    });
    document.getElementById('inp-q').value = '';
    document.getElementById('inp-a').value = '';
    const btn = document.getElementById('save-btn');
    btn.textContent = '✓ Gespeichert!';
    btn.style.background = '#22C55E';
    setTimeout(() => { btn.textContent = 'Speichern'; btn.style.background = ''; }, 1600);
  } catch (err) {
    alert('Fehler: ' + err.message);
  }
}

// ── Cards list ────────────────────────────────────────────────
function openCardsList() {
  document.getElementById('cards-total').textContent =
    `${cards.length} Karte${cards.length !== 1 ? 'n' : ''}`;
  const list = document.getElementById('cards-list');
  if (!cards.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Noch keine Karten vorhanden.</p></div>';
  } else {
    list.innerHTML = [...cards].reverse().map(c =>
      `<div class="card-item ci${c.level || 0}">
        <div class="card-item-body">
          <div class="ci-q">${esc(c.question)}</div>
          <div class="ci-a">${esc(c.answer)}</div>
        </div>
        <button class="del-btn" onclick="deleteCard('${c.id}')">✕</button>
      </div>`
    ).join('');
  }
  showScreen('s-cards');
}

async function deleteCard(id) {
  if (!confirm('Karte löschen?')) return;
  try {
    await deleteDoc(doc(db, 'cards', id));
  } catch (err) {
    alert('Fehler: ' + err.message);
  }
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Kartei Switching ──────────────────────────────────────────
async function triggerImport() {
  if (cards.length > 0) {
    // Auto-save current Kartei
    const today = new Date().toISOString().split('T')[0];
    const lastFilename = localStorage.getItem('lastImportFilename') || `lernkarten-${today}.csv`;

    const rows = [[`# Dateiname: ${lastFilename}`], ['Frage', 'Antwort', 'Level']];
    cards.forEach(c => rows.push([c.question, c.answer, c.level || 0]));
    const csv = rows.map(r =>
      r.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',')
    ).join('\r\n');

    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = lastFilename;
    a.click();
    URL.revokeObjectURL(url);
  }

  // Open file picker
  document.getElementById('csv-in').click();
}

async function switchKartei(input) {
  const file = input.files[0];
  if (!file) return;

  // Delete all current cards
  try {
    for (const card of cards) {
      await deleteDoc(doc(db, 'cards', card.id));
    }
    cards = [];
  } catch (err) {
    console.error('Delete error:', err);
    alert('Fehler beim Löschen der Karten: ' + err.message);
    input.value = '';
    return;
  }

  // Now import the new file
  const reader = new FileReader();
  reader.onload = async (e) => {
    const text = e.target.result.replace(/^﻿/, '');
    const rows = parseCSV(text);
    if (rows.length < 1) { alert('Keine gültigen Daten gefunden.'); return; }

    // Extract filename or use default
    let importedFilename = '';
    let startRow = 0;

    if (rows[0] && rows[0][0] && rows[0][0].startsWith('# Dateiname:')) {
      importedFilename = rows[0][0].replace('# Dateiname:', '').trim();
      startRow = 1;
    } else {
      const today = new Date().toISOString().split('T')[0];
      importedFilename = `lernkarten-${today}.csv`;
    }

    localStorage.setItem('lastImportFilename', importedFilename);

    if (rows.length < startRow + 2) { alert('Keine gültigen Daten gefunden.'); return; }

    let added = 0;
    try {
      for (let i = startRow + 1; i < rows.length; i++) {
        const [q, a, lvl] = rows[i];
        if (!q || !a) continue;

        await addDoc(collection(db, 'cards'), {
          userId: currentUser.uid,
          question: q,
          answer: a,
          level: Math.min(4, Math.max(0, parseInt(lvl) || 0)),
          createdAt: new Date()
        });
        added++;
      }
    } catch (err) {
      console.error('Import error:', err);
    }

    input.value = '';
    alert(`Kartei gewechselt! ${added} Karten importiert.`);
  };
  reader.readAsText(file, 'UTF-8');
}

// ── CSV Export ────────────────────────────────────────────────
function exportCSV() {
  if (!cards.length) { alert('Keine Karten vorhanden.'); return; }

  const today = new Date().toISOString().split('T')[0];
  const lastFilename = localStorage.getItem('lastImportFilename') || `lernkarten-${today}.csv`;
  const filename = prompt('Dateiname:', lastFilename);
  if (!filename) return;

  const rows = [[`# Dateiname: ${filename}`], ['Frage', 'Antwort', 'Level']];
  cards.forEach(c => rows.push([c.question, c.answer, c.level || 0]));
  const csv = rows.map(r =>
    r.map(cell => '"' + String(cell).replace(/"/g, '""') + '"').join(',')
  ).join('\r\n');

  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);

  localStorage.setItem('lastExportFilename', filename);
}

// ── CSV Import ────────────────────────────────────────────────
async function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (e) => {
    const text = e.target.result.replace(/^﻿/, '');
    const rows = parseCSV(text);
    if (rows.length < 1) { alert('Keine gültigen Daten gefunden.'); return; }

    // Dateiname aus erster Zeile extrahieren oder Default generieren
    let importedFilename = '';
    let startRow = 0;

    if (rows[0] && rows[0][0] && rows[0][0].startsWith('# Dateiname:')) {
      importedFilename = rows[0][0].replace('# Dateiname:', '').trim();
      startRow = 1;
    } else {
      const today = new Date().toISOString().split('T')[0];
      importedFilename = `lernkarten-${today}.csv`;
    }

    // Dateiname speichern für nächsten Export
    localStorage.setItem('lastImportFilename', importedFilename);

    if (rows.length < startRow + 2) { alert('Keine gültigen Daten gefunden.'); return; }

    // Alle existierenden Fragen sammeln (Duplikat-Check)
    const existingQuestions = new Set(cards.map(c => c.question.toLowerCase().trim()));

    let added = 0;
    let skipped = 0;
    for (let i = startRow + 1; i < rows.length; i++) {
      const [q, a, lvl] = rows[i];
      if (!q || !a) continue;

      const qLower = q.toLowerCase().trim();
      if (existingQuestions.has(qLower)) {
        skipped++;
        continue;
      }

      try {
        await addDoc(collection(db, 'cards'), {
          userId: currentUser.uid,
          question: q,
          answer: a,
          level: Math.min(4, Math.max(0, parseInt(lvl) || 0)),
          createdAt: new Date()
        });
        existingQuestions.add(qLower);
        added++;
      } catch (err) {
        console.error('Import error:', err);
      }
    }

    input.value = '';
    let msg = `${added} Karte${added !== 1 ? 'n' : ''} importiert.`;
    if (skipped > 0) msg += `\n${skipped} Duplikat${skipped !== 1 ? 'e' : ''} übersprungen.`;
    alert(msg);
  };
  reader.readAsText(file, 'UTF-8');
}

function parseCSV(text) {
  const rows = [];
  let row = [], cell = '', inQ = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQ) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') { inQ = false; }
      else { cell += ch; }
    } else {
      if (ch === '"') { inQ = true; }
      else if (ch === ',') { row.push(cell); cell = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(cell); cell = '';
        if (row.some(c => c.trim())) rows.push(row);
        row = [];
      } else { cell += ch; }
    }
  }
  if (cell || row.length) { row.push(cell); if (row.some(c => c.trim())) rows.push(row); }
  return rows;
}

// ── Quiz engine ───────────────────────────────────────────────
function pickCards(cardsArray, n) {
  const pool = cardsArray.map(c => ({ c, w: WEIGHTS[c.level || 0] }));
  const out = [];
  for (let i = 0; i < Math.min(n, pool.length); i++) {
    const total = pool.reduce((s, p) => s + p.w, 0);
    let r = Math.random() * total;
    let j = 0;
    while (j < pool.length - 1 && r > pool[j].w) { r -= pool[j].w; j++; }
    out.push(pool[j].c);
    pool.splice(j, 1);
  }
  return out;
}

function startQuiz() {
  if (!cards.length) { alert('Noch keine Karten vorhanden.'); return; }
  const picked = pickCards(cards, 10);
  Q = {
    queue: [...picked],
    drill: [],
    drilling: false,
    mainTotal: picked.length,
    mainDone: 0,
    improved: 0,
  };
  showScreen('s-quiz');
  document.getElementById('quiz-title').textContent = 'Abfrage';
  advance();
}

function endQuiz() {
  removeKeyListener();
  if (confirm('Abfrage beenden?')) showScreen('s-home');
}

function advance() {
  if (!Q.queue.length) {
    if (!Q.drill.length) { removeKeyListener(); summary(); return; }
    Q.drilling = true;
    Q.queue = [...Q.drill];
    Q.drill = [];
    document.getElementById('quiz-title').textContent = 'Nachpauken';
  }
  Q.current = Q.queue.shift();
  renderCard();
  addKeyListener();
}

function renderCard() {
  const c = Q.current;

  let progHtml;
  if (!Q.drilling) {
    const pct = Math.round((Q.mainDone / Q.mainTotal) * 100);
    progHtml = `<div class="quiz-meta">
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      <span class="prog-txt">${Q.mainDone} / ${Q.mainTotal}</span>
    </div>`;
  } else {
    const left = Q.queue.length + 1 + Q.drill.length;
    progHtml = `<div class="quiz-meta">
      <div class="prog-bar"><div class="prog-fill" style="width:100%;background:#EF4444"></div></div>
      <span class="prog-txt" style="color:#EF4444">noch ${left} zu pauken</span>
    </div>`;
  }

  document.getElementById('quiz-body').innerHTML = `
    ${progHtml}
    <div class="quiz-actions">
      <button onclick="editFromQuiz()">✏️ Editieren</button>
      <button onclick="endQuiz()">✕ Beenden</button>
    </div>
    <div class="flashcard" id="fc" onclick="reveal()">
      ${Q.drilling ? '<span class="drill-badge">Wiederholen</span>' : ''}
      <div class="fc-label">Frage</div>
      <div class="fc-text">${esc(c.question)}</div>
      <div id="ans-block" style="display:none">
        <div class="fc-divider"></div>
        <div class="fc-label">Antwort</div>
        <div class="fc-text">${esc(c.answer)}</div>
      </div>
      <div class="fc-tap-hint" id="hint">Tippen oder beliebige Taste drücken</div>
    </div>
    <div class="rating-wrap" id="rating-wrap">
      <div class="rating-lbl">Gewusst?</div>
      <div class="rating-btns-2">
        <button class="rbtn2 r-yes" onclick="rate(true)">Gewusst ✓<span class="kbd">C</span></button>
        <button class="rbtn2 r-no"  onclick="rate(false)">Nicht gewusst<span class="kbd">M</span></button>
      </div>
    </div>`;
}

function editFromQuiz() {
  removeKeyListener();
  removeRatingKeyListener();
  openCardsList();
}

function onKey(e) {
  if (['Shift','Control','Alt','Meta','Tab','CapsLock','Escape'].includes(e.key)) return;
  reveal();
}

function onRatingKey(e) {
  if (e.key === 'c' || e.key === 'C') rate(true);
  else if (e.key === 'm' || e.key === 'M') rate(false);
}

function addKeyListener()    { document.addEventListener('keydown', onKey); }
function removeKeyListener() { document.removeEventListener('keydown', onKey); }
function addRatingKeyListener()    { document.addEventListener('keydown', onRatingKey); }
function removeRatingKeyListener() { document.removeEventListener('keydown', onRatingKey); }

function reveal() {
  removeKeyListener();
  document.getElementById('ans-block').style.display = 'block';
  document.getElementById('hint').style.display = 'none';
  document.getElementById('rating-wrap').style.display = 'block';
  const fc = document.getElementById('fc');
  fc.style.cursor = 'default';
  fc.onclick = null;
  addRatingKeyListener();
}

async function rate(knew) {
  removeRatingKeyListener();
  const c = Q.current;
  const newLevel = knew
    ? Math.min(4, (c.level || 0) + 1)
    : Math.max(0, (c.level || 0) - 1);

  try {
    await updateDoc(doc(db, 'cards', c.id), { level: newLevel });
  } catch (err) {
    console.error('Update error:', err);
  }

  if (Q.drilling) {
    if (knew) { Q.improved++; }
    else { Q.drill.push(c); }
  } else {
    Q.mainDone++;
    if (!knew) { Q.drill.push(c); }
  }

  advance();
}

function summary() {
  const good = cards.filter(c => c.level >= 3).length;
  const emoji = Q.improved > 0 ? '🚀' : '✅';
  const title = Q.improved > 0 ? 'Super gemacht!' : 'Runde beendet!';
  let msg = Q.improved > 0
    ? `${Q.improved} Karte${Q.improved !== 1 ? 'n' : ''} verbessert. `
    : 'Alle Karten durchgegangen. ';
  msg += `${good} von ${cards.length} Karten gut bekannt.`;

  document.getElementById('quiz-body').innerHTML = `
    <div class="summary">
      <div class="sum-emoji">${emoji}</div>
      <div class="sum-title">${title}</div>
      <div class="sum-text">${msg}</div>
      <div class="sum-btns">
        <button class="btn btn-primary" onclick="startQuiz()">Nochmal abfragen</button>
        <button class="btn btn-secondary" onclick="showScreen('s-home')">Zur Übersicht</button>
      </div>
    </div>`;
}

// Expose functions globally
window.showScreen = showScreen;
window.startQuiz = startQuiz;
window.endQuiz = endQuiz;
window.advance = advance;
window.renderCard = renderCard;
window.reveal = reveal;
window.rate = rate;
window.editFromQuiz = editFromQuiz;
window.addCard = addCard;
window.openCardsList = openCardsList;
window.deleteCard = deleteCard;
window.exportCSV = exportCSV;
window.importCSV = importCSV;
window.triggerImport = triggerImport;
window.switchKartei = switchKartei;
window.loginGoogle = loginGoogle;
window.logout = logout;
window.esc = esc;
window.parseCSV = parseCSV;
</script>
